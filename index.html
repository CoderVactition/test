<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>BACKMASK</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,300;9..144,0,500;9..144,1,300;9..144,1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0908;
    --ink: #f4ede4;
    --dim: #6b6358;
    --accent: #e63946;
    --gold: #d4a574;
    --line: #2a2622;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
  }
  .frame {
    width: 100%;
    max-width: 480px;
    border: 1px solid var(--line);
    padding: 24px 22px;
    background: rgba(15,12,10,0.4);
  }
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--dim);
    margin-bottom: 18px;
    text-transform: uppercase;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 8px var(--gold);
  }
  .brand { color: var(--ink); font-weight: 500; }
  .ver { margin-left: auto; }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 32px;
    line-height: 0.95;
    letter-spacing: -0.02em;
    margin-bottom: 18px;
  }
  h1 em {
    font-style: italic;
    color: var(--gold);
    font-weight: 500;
  }
  .phrase {
    border: 1px solid var(--line);
    padding: 18px 16px;
    margin-bottom: 18px;
    text-align: center;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    width: 100%;
    color: var(--ink);
    font-family: inherit;
    display: block;
  }
  .phrase .pLabel {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .phrase .pText {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 22px;
    line-height: 1.3;
    color: var(--gold);
  }
  .phrase .pHint {
    font-size: 8px;
    letter-spacing: 0.25em;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: 10px;
  }
  input[type=file] { display: none; }
  .sourceRow {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 6px;
  }
  .miniBtn {
    border: 1px solid var(--line);
    padding: 12px 8px;
    text-align: center;
    cursor: pointer;
    display: block;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
    background: transparent;
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
  }
  .miniBtn.recording {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    animation: blink 1s steps(2) infinite;
  }
  .recBtn {
    width: 100%;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 14px;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    background: transparent;
    cursor: pointer;
    margin-bottom: 18px;
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
  }
  .recBtn:disabled { opacity: 0.2; }
  .recBtn.recording {
    background: var(--accent);
    color: var(--bg);
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.65; } }
  canvas {
    width: 100%;
    height: 64px;
    display: block;
    background: #06050a;
    border: 1px solid var(--line);
    margin-bottom: 18px;
  }
  .stack {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .stack button {
    width: 100%;
    font-family: inherit;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line);
    cursor: pointer;
    padding: 22px 20px;
    text-align: left;
    -webkit-appearance: none;
    appearance: none;
    transition: border-color 0.15s ease, background 0.15s ease;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .stack button.now-playing {
    border-color: var(--gold);
    background: rgba(212, 165, 116, 0.06);
  }
  .stack button:disabled { opacity: 0.2; }
  .stack button .num {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 32px;
    line-height: 1;
    color: var(--gold);
    width: 28px;
    flex-shrink: 0;
  }
  .stack button .label {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stack button .title {
    font-size: 14px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .stack button .meta {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .stack button .arrow {
    color: var(--dim);
    font-size: 14px;
  }
  .stack button.now-playing .arrow { color: var(--gold); }
  .exportBtn {
    width: 100%;
    margin-top: 14px;
    padding: 16px;
    background: var(--gold);
    color: var(--bg);
    border: 1px solid var(--gold);
    font-family: inherit;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
  }
  .exportBtn:disabled {
    opacity: 0.2;
    background: transparent;
    color: var(--gold);
  }
  .status {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
    font-size: 9px;
    color: var(--dim);
    display: flex;
    justify-content: space-between;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .status span:last-child { color: var(--ink); }
</style>
</head>
<body>
  <div class="frame">
    <div class="header">
      <div class="dot"></div>
      <span class="brand">BACKMASK</span>
      <span class="ver">v.05</span>
    </div>

    <h1>Sing it<br><em>backwards.</em></h1>

    <button id="phraseBtn" class="phrase">
      <div class="pLabel">↻ phrase</div>
      <div class="pText" id="phraseText">tap to roll a phrase</div>
      <div class="pHint">tap again to reroll</div>
    </button>

    <div class="sourceRow">
      <label class="miniBtn" for="file">load file</label>
      <button id="recSrcBtn" class="miniBtn">● rec source</button>
    </div>
    <input type="file" id="file" />

    <button id="recBtn" class="recBtn" disabled>● record your try</button>

    <canvas id="wave"></canvas>

    <div class="stack">
      <button id="bA" disabled>
        <span class="num">A</span>
        <span class="label">
          <span class="title">Original</span>
          <span class="meta">source</span>
        </span>
        <span class="arrow">▶</span>
      </button>
      <button id="bB" disabled>
        <span class="num">B</span>
        <span class="label">
          <span class="title">Reversed</span>
          <span class="meta">source flipped</span>
        </span>
        <span class="arrow">▶</span>
      </button>
      <button id="bC" disabled>
        <span class="num">C</span>
        <span class="label">
          <span class="title">Your Try</span>
          <span class="meta">raw mimic</span>
        </span>
        <span class="arrow">▶</span>
      </button>
      <button id="bD" disabled>
        <span class="num">D</span>
        <span class="label">
          <span class="title">Try Reversed</span>
          <span class="meta">mimic flipped</span>
        </span>
        <span class="arrow">▶</span>
      </button>
    </div>

    <button id="exportBtn" class="exportBtn" disabled>↓ export full mix</button>

    <div class="status">
      <span>signal</span>
      <span id="status">idle</span>
    </div>
  </div>

<script>
const ADJ = ['sleepy','tiny','golden','dusty','sneaky','electric','ancient','salty','wild','frozen','lonely','broken','secret','restless','dizzy','crooked','silver','hollow','tangled','bitter','gentle','rusty','hidden','foolish','clever','lucky','glowing','quiet','bored','furious','enormous','invisible'];
const NOUN = ['cat','wizard','robot','ghost','dragon','pirate','moon','river','mountain','tower','garden','kitchen','bicycle','rocket','mirror','shadow','whisper','dream','jacket','ocean','forest','candle','train','balloon','telephone','painting','monster','pickle','bagel','cloud','magnet','pillow','mailman','grandma','penguin','submarine','volcano','lighthouse','sandwich','umbrella'];
const VERB = ['kissed','chased','sang to','waved at','painted','juggled','swallowed','hugged','photographed','hypnotized','ignored','followed','stole','untangled','balanced','broke','married','tickled','interviewed','arrested','befriended','outran','impressed','fed','tackled','rescued','annoyed','copied','outsmarted','warned'];

const TEMPLATES = [
  'The {adj} {noun} {verb} my {noun}.',
  'A {adj} {noun} {verb} the {adj} {noun}.',
  'Yesterday I saw a {noun} {verb} a {noun}.',
  'Never trust a {adj} {noun} with a {noun}.',
  'My {noun} {verb} the {adj} {noun} last night.',
  'Every {adj} {noun} secretly {verb} the {noun}.'
];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generatePhrase() {
  const t = pick(TEMPLATES);
  return t.replace(/\{(adj|noun|verb)\}/g, (_, kind) => {
    if (kind === 'adj') return pick(ADJ);
    if (kind === 'noun') return pick(NOUN);
    return pick(VERB);
  });
}

const phraseBtn = document.getElementById('phraseBtn');
const phraseText = document.getElementById('phraseText');
phraseBtn.addEventListener('click', () => {
  phraseText.textContent = '"' + generatePhrase() + '"';
});

const fileInput = document.getElementById('file');
const recSrcBtn = document.getElementById('recSrcBtn');
const recBtn = document.getElementById('recBtn');
const exportBtn = document.getElementById('exportBtn');
const bA = document.getElementById('bA');
const bB = document.getElementById('bB');
const bC = document.getElementById('bC');
const bD = document.getElementById('bD');
const statusEl = document.getElementById('status');
const canvas = document.getElementById('wave');
const ctx = canvas.getContext('2d');

let audioCtx;
const buffers = { A: null, B: null, C: null, D: null };
let currentSource, currentBtn;
let activeRecorder = null, activeChunks = [], activeMode = null;

function setStatus(s) { statusEl.textContent = s; }

function refreshExportBtn() {
  const any = ['A','B','C','D'].some(k => buffers[k]);
  exportBtn.disabled = !any;
}

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = canvas.offsetHeight * dpr;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(dpr, dpr);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawWave(buffer) {
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  ctx.clearRect(0, 0, w, h);
  if (!buffer) return;
  const data = buffer.getChannelData(0);
  const step = Math.ceil(data.length / w);
  ctx.strokeStyle = '#d4a574';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = 0; x < w; x++) {
    let min = 1, max = -1;
    for (let i = 0; i < step; i++) {
      const v = data[x * step + i] || 0;
      if (v < min) min = v;
      if (v > max) max = v;
    }
    ctx.moveTo(x, (1 + min) * h / 2);
    ctx.lineTo(x, (1 + max) * h / 2);
  }
  ctx.stroke();
}

function reverseBuffer(buffer) {
  const reversed = audioCtx.createBuffer(buffer.numberOfChannels, buffer.length, buffer.sampleRate);
  for (let ch = 0; ch < buffer.numberOfChannels; ch++) {
    const src = buffer.getChannelData(ch);
    const dst = reversed.getChannelData(ch);
    for (let i = 0, n = src.length; i < n; i++) dst[i] = src[n - 1 - i];
  }
  return reversed;
}

async function ensureCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
}

async function decodeBlob(blob) {
  await ensureCtx();
  const arrayBuf = await blob.arrayBuffer();
  return await audioCtx.decodeAudioData(arrayBuf);
}

function loadSource(buffer) {
  buffers.A = buffer;
  buffers.B = reverseBuffer(buffer);
  buffers.C = null;
  buffers.D = null;
  bA.disabled = false;
  bB.disabled = false;
  bC.disabled = true;
  bD.disabled = true;
  recBtn.disabled = false;
  drawWave(buffer);
  refreshExportBtn();
}

async function handleFile(file) {
  if (!file) return;
  setStatus('decoding...');
  try {
    const buf = await decodeBlob(file);
    loadSource(buf);
    setStatus('source loaded');
  } catch (err) {
    setStatus('decode failed');
  }
}

async function startRecording(mode) {
  await ensureCtx();
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    activeChunks = [];
    activeMode = mode;
    let mime = '';
    if (MediaRecorder.isTypeSupported('audio/mp4')) mime = 'audio/mp4';
    else if (MediaRecorder.isTypeSupported('audio/webm')) mime = 'audio/webm';
    activeRecorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
    activeRecorder.ondataavailable = e => { if (e.data.size > 0) activeChunks.push(e.data); };
    activeRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(activeChunks, { type: activeRecorder.mimeType });
      try {
        const buf = await decodeBlob(blob);
        if (mode === 'source') {
          loadSource(buf);
          setStatus('source recorded');
        } else {
          buffers.C = buf;
          buffers.D = reverseBuffer(buf);
          bC.disabled = false;
          bD.disabled = false;
          drawWave(buf);
          setStatus('try ready');
          refreshExportBtn();
        }
      } catch (err) {
        setStatus('decode failed');
      }
      activeRecorder = null;
      activeMode = null;
    };
    activeRecorder.start();
    if (mode === 'source') {
      recSrcBtn.classList.add('recording');
      recSrcBtn.textContent = '■ stop';
      setStatus('recording source');
    } else {
      recBtn.classList.add('recording');
      recBtn.textContent = '■ stop';
      setStatus('recording try');
    }
  } catch (err) {
    setStatus('mic denied');
  }
}

function stopRecording() {
  if (activeRecorder && activeRecorder.state !== 'inactive') activeRecorder.stop();
  recSrcBtn.classList.remove('recording');
  recSrcBtn.textContent = '● rec source';
  recBtn.classList.remove('recording');
  recBtn.textContent = '● record your try';
}

async function play(key, btn, label) {
  const buffer = buffers[key];
  if (!buffer) return;
  await ensureCtx();
  if (currentSource) { try { currentSource.stop(); } catch(e){} }
  if (currentBtn) currentBtn.classList.remove('now-playing');
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  src.connect(audioCtx.destination);
  src.start();
  currentSource = src;
  currentBtn = btn;
  btn.classList.add('now-playing');
  drawWave(buffer);
  setStatus('playing ' + label);
  src.onended = () => {
    btn.classList.remove('now-playing');
    if (currentBtn === btn) currentBtn = null;
    setStatus('idle');
  };
}

function encodeWAV(buffer) {
  const numChannels = buffer.numberOfChannels;
  const sampleRate = buffer.sampleRate;
  const length = buffer.length;
  const blockAlign = numChannels * 2;
  const dataSize = length * blockAlign;
  const ab = new ArrayBuffer(44 + dataSize);
  const view = new DataView(ab);
  const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
  writeStr(0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * blockAlign, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, 16, true);
  writeStr(36, 'data');
  view.setUint32(40, dataSize, true);
  let offset = 44;
  const channels = [];
  for (let ch = 0; ch < numChannels; ch++) channels.push(buffer.getChannelData(ch));
  for (let i = 0; i < length; i++) {
    for (let ch = 0; ch < numChannels; ch++) {
      let s = Math.max(-1, Math.min(1, channels[ch][i]));
      view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      offset += 2;
    }
  }
  return new Blob([ab], { type: 'audio/wav' });
}

async function exportMix() {
  const order = ['A','B','C','D'];
  const list = order.map(k => buffers[k]).filter(b => b);
  if (!list.length) return;
  exportBtn.disabled = true;
  setStatus('rendering...');
  try {
    await ensureCtx();
    const sr = audioCtx.sampleRate;
    const gap = 0.6;
    let total = 0;
    for (const b of list) total += b.duration;
    total += gap * (list.length - 1);
    const offline = new OfflineAudioContext(1, Math.ceil(total * sr), sr);
    let t = 0;
    for (let i = 0; i < list.length; i++) {
      const src = offline.createBufferSource();
      src.buffer = list[i];
      src.connect(offline.destination);
      src.start(t);
      t += list[i].duration + gap;
    }
    const rendered = await offline.startRendering();
    const wav = encodeWAV(rendered);
    const stamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    const filename = 'backmask-' + stamp + '.wav';
    const file = new File([wav], filename, { type: 'audio/wav' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: 'BACKMASK' });
        setStatus('exported');
      } catch (err) {
        setStatus(err.name === 'AbortError' ? 'cancelled' : 'share failed');
      }
    } else {
      const url = URL.createObjectURL(wav);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 2000);
      setStatus('downloaded');
    }
  } catch (err) {
    setStatus('export failed');
  }
  refreshExportBtn();
}

fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
recSrcBtn.addEventListener('click', () => {
  if (activeMode === 'source') stopRecording();
  else if (!activeMode) startRecording('source');
});
recBtn.addEventListener('click', () => {
  if (activeMode === 'try') stopRecording();
  else if (!activeMode) startRecording('try');
});
bA.addEventListener('click', () => play('A', bA, 'original'));
bB.addEventListener('click', () => play('B', bB, 'reversed'));
bC.addEventListener('click', () => play('C', bC, 'your try'));
bD.addEventListener('click', () => play('D', bD, 'try reversed'));
exportBtn.addEventListener('click', exportMix);
</script>
</body>
</html>
