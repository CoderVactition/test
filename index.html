<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>BACKMASK</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0908;
    --ink: #f4ede4;
    --dim: #6b6358;
    --accent: #e63946;
    --gold: #d4a574;
    --line: #2a2622;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
  }
  .frame {
    width: 100%;
    max-width: 480px;
    border: 1px solid var(--line);
    padding: 28px 24px;
    background: rgba(15,12,10,0.4);
  }
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--dim);
    margin-bottom: 24px;
    text-transform: uppercase;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 8px var(--gold);
  }
  .brand { color: var(--ink); font-weight: 500; }
  .ver { margin-left: auto; }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 38px;
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
  }
  h1 em {
    font-style: italic;
    color: var(--gold);
    font-weight: 500;
  }
  .sub {
    color: var(--dim);
    font-size: 11px;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .drop {
    border: 1px dashed var(--line);
    padding: 18px 16px;
    text-align: center;
    margin-bottom: 10px;
    cursor: pointer;
    display: block;
  }
  .drop p { font-size: 11px; letter-spacing: 0.1em; }
  .drop .hint { color: var(--dim); font-size: 9px; margin-top: 6px; letter-spacing: 0.2em; }
  input[type=file] { display: none; }
  .recBtn {
    width: 100%;
    padding: 18px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    margin-bottom: 22px;
    -webkit-appearance: none;
    appearance: none;
  }
  .recBtn:disabled { opacity: 0.25; }
  .recBtn.recording {
    background: var(--accent);
    color: var(--bg);
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.65; } }
  canvas {
    width: 100%;
    height: 80px;
    display: block;
    background: #06050a;
    border: 1px solid var(--line);
  }
  .trackLabel {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 8px 0;
    margin-bottom: 18px;
    text-align: center;
    border-bottom: 1px solid var(--line);
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .grid button {
    font-family: inherit;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line);
    cursor: pointer;
    padding: 14px 12px;
    text-align: left;
    -webkit-appearance: none;
    appearance: none;
    position: relative;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .grid button.now-playing {
    border-color: var(--gold);
    background: rgba(212, 165, 116, 0.06);
  }
  .grid button:disabled { opacity: 0.2; }
  .grid button .num {
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.1em;
  }
  .grid button .title {
    display: block;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .grid button .meta {
    display: block;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .status {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
    font-size: 10px;
    color: var(--dim);
    display: flex;
    justify-content: space-between;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .status span:last-child { color: var(--ink); }
  .ios-note {
    font-size: 9px;
    color: var(--dim);
    text-align: center;
    margin-top: 12px;
    letter-spacing: 0.1em;
    font-style: italic;
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="header">
      <div class="dot"></div>
      <span class="brand">BACKMASK</span>
      <span class="ver">v.01</span>
    </div>

    <h1>Sing it<br><em>backwards.</em></h1>
    <p class="sub">Load a clip. Hear it reversed. Mimic the reversed sound. Reverse your mimic. If you nailed it, your mimic-flipped echoes the original.</p>

    <label class="drop" for="file">
      <p>load source clip</p>
      <p class="hint">mp3 · m4a · wav · ogg</p>
    </label>
    <input type="file" id="file" />

    <button id="recBtn" class="recBtn" disabled>● record your try</button>

    <canvas id="wave"></canvas>
    <div class="trackLabel" id="trackLabel">— no clip loaded —</div>

    <div class="grid">
      <button id="bA" disabled>
        <span class="num">A</span>
        <span class="title">Original</span>
        <span class="meta">source</span>
      </button>
      <button id="bB" disabled>
        <span class="num">B</span>
        <span class="title">Reversed</span>
        <span class="meta">source flipped</span>
      </button>
      <button id="bC" disabled>
        <span class="num">C</span>
        <span class="title">Your Try</span>
        <span class="meta">raw mimic</span>
      </button>
      <button id="bD" disabled>
        <span class="num">D</span>
        <span class="title">Try Reversed</span>
        <span class="meta">mimic flipped</span>
      </button>
    </div>

    <div class="status">
      <span>signal</span>
      <span id="status">idle</span>
    </div>

    <div class="ios-note">iOS: flip silent switch off for sound</div>
  </div>

<script>
const fileInput = document.getElementById('file');
const recBtn = document.getElementById('recBtn');
const bA = document.getElementById('bA');
const bB = document.getElementById('bB');
const bC = document.getElementById('bC');
const bD = document.getElementById('bD');
const statusEl = document.getElementById('status');
const trackLabel = document.getElementById('trackLabel');
const canvas = document.getElementById('wave');
const ctx = canvas.getContext('2d');

let audioCtx;
const buffers = { A: null, B: null, C: null, D: null };
let currentSource, currentBtn;
let mediaRecorder, chunks = [], isRecording = false;

function setStatus(s) { statusEl.textContent = s; }

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = canvas.offsetHeight * dpr;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(dpr, dpr);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawWave(buffer) {
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  ctx.clearRect(0, 0, w, h);
  if (!buffer) return;
  const data = buffer.getChannelData(0);
  const step = Math.ceil(data.length / w);
  ctx.strokeStyle = '#d4a574';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = 0; x < w; x++) {
    let min = 1, max = -1;
    for (let i = 0; i < step; i++) {
      const v = data[x * step + i] || 0;
      if (v < min) min = v;
      if (v > max) max = v;
    }
    ctx.moveTo(x, (1 + min) * h / 2);
    ctx.lineTo(x, (1 + max) * h / 2);
  }
  ctx.stroke();
}

function reverseBuffer(buffer) {
  const reversed = audioCtx.createBuffer(buffer.numberOfChannels, buffer.length, buffer.sampleRate);
  for (let ch = 0; ch < buffer.numberOfChannels; ch++) {
    const src = buffer.getChannelData(ch);
    const dst = reversed.getChannelData(ch);
    for (let i = 0, n = src.length; i < n; i++) dst[i] = src[n - 1 - i];
  }
  return reversed;
}

async function ensureCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
}

async function decodeBlob(blob) {
  await ensureCtx();
  const arrayBuf = await blob.arrayBuffer();
  return await audioCtx.decodeAudioData(arrayBuf);
}

async function handleFile(file) {
  if (!file) return;
  setStatus('decoding source...');
  try {
    buffers.A = await decodeBlob(file);
    buffers.B = reverseBuffer(buffers.A);
    drawWave(buffers.A);
    bA.disabled = false;
    bB.disabled = false;
    recBtn.disabled = false;
    trackLabel.textContent = 'source · ' + buffers.A.duration.toFixed(2) + 's';
    setStatus('ready · play A or B, then record');
  } catch (err) {
    setStatus('decode failed');
    console.error(err);
  }
}

async function startRecording() {
  await ensureCtx();
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    chunks = [];
    let mime = '';
    if (MediaRecorder.isTypeSupported('audio/mp4')) mime = 'audio/mp4';
    else if (MediaRecorder.isTypeSupported('audio/webm')) mime = 'audio/webm';
    mediaRecorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(chunks, { type: mediaRecorder.mimeType });
      try {
        buffers.C = await decodeBlob(blob);
        buffers.D = reverseBuffer(buffers.C);
        bC.disabled = false;
        bD.disabled = false;
        drawWave(buffers.C);
        trackLabel.textContent = 'try · ' + buffers.C.duration.toFixed(2) + 's';
        setStatus('try ready · compare A·B·C·D');
      } catch (err) {
        setStatus('try decode failed');
      }
    };
    mediaRecorder.start();
    isRecording = true;
    recBtn.classList.add('recording');
    recBtn.textContent = '■ stop';
    setStatus('recording your try...');
  } catch (err) {
    setStatus('mic denied');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;
  recBtn.classList.remove('recording');
  recBtn.textContent = '● record your try';
}

async function play(key, btn, label) {
  const buffer = buffers[key];
  if (!buffer) return;
  await ensureCtx();
  if (currentSource) { try { currentSource.stop(); } catch(e){} }
  if (currentBtn) currentBtn.classList.remove('now-playing');
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  src.connect(audioCtx.destination);
  src.start();
  currentSource = src;
  currentBtn = btn;
  btn.classList.add('now-playing');
  drawWave(buffer);
  setStatus('playing · ' + label);
  src.onended = () => {
    btn.classList.remove('now-playing');
    if (currentBtn === btn) currentBtn = null;
    setStatus('idle');
  };
}

fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
recBtn.addEventListener('click', () => { if (isRecording) stopRecording(); else startRecording(); });
bA.addEventListener('click', () => play('A', bA, 'original'));
bB.addEventListener('click', () => play('B', bB, 'reversed'));
bC.addEventListener('click', () => play('C', bC, 'your try'));
bD.addEventListener('click', () => play('D', bD, 'try reversed'));
</script>
</body>
</html>
