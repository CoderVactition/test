<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reverse Audio · Upload</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0e10;
    --ink: #f4ede4;
    --dim: #8a8377;
    --accent: #ff5b35;
    --line: #2a2723;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(255,91,53,0.08), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(255,91,53,0.06), transparent 40%);
  }
  .frame {
    width: 100%;
    max-width: 560px;
    border: 1px solid var(--line);
    padding: 32px 28px;
    background: rgba(15,16,18,0.6);
    backdrop-filter: blur(6px);
  }
  .label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 44px;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  h1 em {
    font-style: italic;
    color: var(--accent);
    font-weight: 500;
  }
  .sub {
    color: var(--dim);
    font-size: 12px;
    margin: 10px 0 28px;
  }
  .drop {
    border: 1px dashed var(--line);
    padding: 36px 16px;
    text-align: center;
    margin-bottom: 22px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .drop:hover, .drop.over {
    border-color: var(--accent);
    color: var(--accent);
  }
  .drop p { font-size: 12px; }
  .drop .hint { color: var(--dim); font-size: 10px; margin-top: 8px; letter-spacing: 0.1em; }
  input[type=file] { display: none; }
  canvas {
    width: 100%;
    height: 90px;
    display: block;
    background: #08090a;
    border: 1px solid var(--line);
    margin-bottom: 22px;
  }
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  button {
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 14px 8px;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  button:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  .status {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    font-size: 11px;
    color: var(--dim);
    display: flex;
    justify-content: space-between;
  }
  .status span:last-child { color: var(--ink); }
</style>
</head>
<body>
  <div class="frame">
    <div class="label">002 // Web Audio Demo</div>
    <h1>Reverse <em>audio</em></h1>
    <p class="sub">Drop in any audio file → decoded → buffer flipped → played.</p>

```
<label class="drop" id="drop">
  <p>Tap to choose · or drag a file</p>
  <p class="hint">MP3 · M4A · WAV · OGG · WEBM</p>
  <input type="file" id="file" accept="audio/*" />
</label>

<canvas id="wave"></canvas>

<div class="controls">
  <button id="playBtn" disabled>▶ Original</button>
  <button id="revBtn" disabled>◀ Reversed</button>
</div>

<div class="status">
  <span>STATUS</span>
  <span id="status">awaiting file</span>
</div>
```

  </div>

<script>
const fileInput = document.getElementById('file');
const drop = document.getElementById('drop');
const playBtn = document.getElementById('playBtn');
const revBtn = document.getElementById('revBtn');
const statusEl = document.getElementById('status');
const canvas = document.getElementById('wave');
const ctx = canvas.getContext('2d');

let audioCtx, originalBuffer, reversedBuffer, currentSource;

function setStatus(s) { statusEl.textContent = s; }

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = canvas.offsetHeight * dpr;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(dpr, dpr);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawWave(buffer) {
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  ctx.clearRect(0, 0, w, h);
  if (!buffer) return;
  const data = buffer.getChannelData(0);
  const step = Math.ceil(data.length / w);
  ctx.strokeStyle = '#ff5b35';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = 0; x < w; x++) {
    let min = 1, max = -1;
    for (let i = 0; i < step; i++) {
      const v = data[x * step + i] || 0;
      if (v < min) min = v;
      if (v > max) max = v;
    }
    ctx.moveTo(x, (1 + min) * h / 2);
    ctx.lineTo(x, (1 + max) * h / 2);
  }
  ctx.stroke();
}

function reverseBuffer(buffer) {
  const reversed = audioCtx.createBuffer(
    buffer.numberOfChannels,
    buffer.length,
    buffer.sampleRate
  );
  for (let ch = 0; ch < buffer.numberOfChannels; ch++) {
    const src = buffer.getChannelData(ch);
    const dst = reversed.getChannelData(ch);
    for (let i = 0, n = src.length; i < n; i++) {
      dst[i] = src[n - 1 - i];
    }
  }
  return reversed;
}

async function handleFile(file) {
  if (!file) return;
  setStatus('decoding...');
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    const arrayBuf = await file.arrayBuffer();
    originalBuffer = await audioCtx.decodeAudioData(arrayBuf);
    reversedBuffer = reverseBuffer(originalBuffer);
    drawWave(originalBuffer);
    playBtn.disabled = false;
    revBtn.disabled = false;
    setStatus(`loaded ${originalBuffer.duration.toFixed(2)}s`);
  } catch (err) {
    setStatus('decode failed');
    console.error(err);
  }
}

function play(buffer, label) {
  if (!buffer) return;
  if (currentSource) { try { currentSource.stop(); } catch(e){} }
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  src.connect(audioCtx.destination);
  src.start();
  currentSource = src;
  setStatus(`playing ${label}`);
  drawWave(buffer);
  src.onended = () => setStatus('idle');
}

fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

['dragenter','dragover'].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('over'); })
);
['dragleave','drop'].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('over'); })
);
drop.addEventListener('drop', e => {
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

playBtn.addEventListener('click', () => play(originalBuffer, 'original'));
revBtn.addEventListener('click', () => play(reversedBuffer, 'reversed'));
</script>

</body>
</html>
