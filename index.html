<style>:root{--bg:#0a0908;--ink:#f4ede4;--dim:#6b6358;--accent:#e63946;--gold:#d4a574;--line:#2a2622}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{background:var(--bg);color:var(--ink);font-family:'JetBrains Mono',monospace;min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;background-image:repeating-linear-gradient(0deg,rgba(255,255,255,0.015) 0,rgba(255,255,255,0.015) 1px,transparent 1px,transparent 3px)}.frame{width:100%;max-width:480px;border:1px solid var(--line);padding:24px 22px;background:rgba(15,12,10,0.4)}.header{display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:0.25em;color:var(--dim);margin-bottom:18px;text-transform:uppercase}.dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold)}.brand{color:var(--ink);font-weight:500}.ver{margin-left:auto}h1{font-family:'Fraunces',serif;font-weight:300;font-size:28px;line-height:1;letter-spacing:-0.02em;margin-bottom:18px;white-space:nowrap}h1 em{font-style:italic;color:var(--gold);font-weight:500}.stack{display:flex;flex-direction:column;gap:8px;margin-bottom:22px}.row{display:flex;gap:6px;align-items:stretch}.row .play{flex:1;font-family:inherit;background:transparent;color:var(--ink);border:1px solid var(--line);cursor:pointer;padding:22px 20px;text-align:left;-webkit-appearance:none;appearance:none;transition:border-color .2s ease,background .2s ease,opacity .2s ease;display:flex;align-items:center;gap:18px}.row .play.now-playing{border-color:var(--gold);background:rgba(212,165,116,0.06)}.row .play:disabled{opacity:.2}.row .play.next-up:not(:disabled){border-color:var(--gold);animation:nextPulse 2s ease-in-out infinite}.row .play.next-up:not(:disabled) .num{color:var(--gold)}@keyframes nextPulse{0%,100%{box-shadow:0 0 0 0 rgba(212,165,116,0);border-color:var(--gold)}50%{box-shadow:0 0 0 4px rgba(212,165,116,0.15);border-color:#e8c294}}.row .play .num{font-family:'Fraunces',serif;font-weight:300;font-size:32px;line-height:1;color:var(--gold);width:28px;flex-shrink:0;transition:color .2s ease}.row .play .label{flex:1;display:flex;flex-direction:column;gap:4px}.row .play .title{font-size:13px;letter-spacing:0.08em;text-transform:uppercase;font-weight:500}.row .play .meta{font-size:9px;color:var(--dim);letter-spacing:0.18em;text-transform:uppercase}.row .play .arrow{color:var(--dim);font-size:14px;transition:color .2s ease}.row .play.now-playing .arrow,.row .play.next-up:not(:disabled) .arrow{color:var(--gold)}.row .quickRec{width:60px;border:1px solid var(--line);background:transparent;color:var(--accent);cursor:pointer;-webkit-appearance:none;appearance:none;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;transition:border-color .2s ease,background .2s ease}.row .quickRec:disabled{opacity:.3}.row .quickRec.next-up:not(:disabled){border-color:var(--accent);animation:recPulse 1.6s ease-in-out infinite}@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(230,57,70,0)}50%{box-shadow:0 0 0 4px rgba(230,57,70,0.2)}}.row .quickRec.recording{background:var(--accent);color:var(--bg);border-color:var(--accent);animation:blink 1s steps(2) infinite;font-size:14px}.quickSpacer{width:60px;flex-shrink:0}.phrase{border:1px solid var(--line);padding:18px 16px;margin-bottom:18px;text-align:center;cursor:pointer;-webkit-appearance:none;appearance:none;background:transparent;width:100%;color:var(--ink);font-family:inherit;display:block}.phrase .pLabel{font-size:9px;letter-spacing:0.3em;color:var(--dim);text-transform:uppercase;margin-bottom:8px}.phrase .pText{font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:22px;line-height:1.3;color:var(--gold)}.phrase .pHint{font-size:8px;letter-spacing:0.25em;color:var(--dim);text-transform:uppercase;margin-top:10px}@keyframes blink{0%,100%{opacity:1}50%{opacity:.65}}.exportBtn{width:100%;padding:16px;background:var(--gold);color:var(--bg);border:1px solid var(--gold);font-family:inherit;font-size:11px;font-weight:500;letter-spacing:0.3em;text-transform:uppercase;cursor:pointer;-webkit-appearance:none;appearance:none}.exportBtn:disabled{opacity:.2;background:transparent;color:var(--gold)}.status{margin-top:14px;padding-top:12px;border-top:1px solid var(--line);font-size:9px;color:var(--dim);display:flex;justify-content:space-between;letter-spacing:0.2em;text-transform:uppercase}.status span:last-child{color:var(--ink)}</style>

<body>
  <div class="frame">
    <div class="header">
      <div class="dot"></div>
      <span class="brand">BACKMASK</span>
      <span class="ver">v.12</span>
    </div>
    <h1>Sing it <em>backwards.</em></h1>
    <div class="stack">
      <div class="row">
        <button id="bA" class="play next-up" disabled><span class="num">A</span><span class="label"><span class="title">Start singing here!</span><span class="meta">your source clip</span></span><span class="arrow">▶</span></button>
        <button id="quickA" class="quickRec next-up">●</button>
      </div>
      <div class="row">
        <button id="bB" class="play" disabled><span class="num">B</span><span class="label"><span class="title">Play this for your friend</span><span class="meta">reversed source</span></span><span class="arrow">▶</span></button>
        <span class="quickSpacer"></span>
      </div>
      <div class="row">
        <button id="bC" class="play" disabled><span class="num">C</span><span class="label"><span class="title">Record your friend</span><span class="meta">their mimic</span></span><span class="arrow">▶</span></button>
        <button id="quickC" class="quickRec" disabled>●</button>
      </div>
      <div class="row">
        <button id="bD" class="play" disabled><span class="num">D</span><span class="label"><span class="title">See how they did</span><span class="meta">mimic flipped</span></span><span class="arrow">▶</span></button>
        <span class="quickSpacer"></span>
      </div>
    </div>
    <button id="phraseBtn" class="phrase">
      <div class="pLabel">↻ phrase</div>
      <div class="pText" id="phraseText">tap to roll a phrase</div>
      <div class="pHint">tap again to reroll</div>
    </button>
    <button id="exportBtn" class="exportBtn" disabled>↓ export full mix</button>
    <div class="status">
      <span>signal</span>
      <span id="status">tap ● to start recording</span>
    </div>
  </div>
<script>
const ADJ=['sleepy','tiny','golden','dusty','sneaky','electric','ancient','salty','wild','frozen','lonely','broken','secret','restless','dizzy','crooked','silver','hollow','tangled','bitter','gentle','rusty','hidden','foolish','clever','lucky','glowing','quiet','bored','furious','enormous','invisible'];
const NOUN=['cat','wizard','robot','ghost','dragon','pirate','moon','river','mountain','tower','garden','kitchen','bicycle','rocket','mirror','shadow','whisper','dream','jacket','ocean','forest','candle','train','balloon','telephone','painting','monster','pickle','bagel','cloud','magnet','pillow','mailman','grandma','penguin','submarine','volcano','lighthouse','sandwich','umbrella'];
const VERB=['kissed','chased','sang to','waved at','painted','juggled','swallowed','hugged','photographed','hypnotized','ignored','followed','stole','untangled','balanced','broke','married','tickled','interviewed','arrested','befriended','outran','impressed','fed','tackled','rescued','annoyed','copied','outsmarted','warned'];
const TEMPLATES=['{adj} {noun}','{adj} {adj} {noun}','the {adj} {noun}','{noun} and {noun}','{verb} the {noun}','{adj} {noun} {verb}'];
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function generatePhrase(){return pick(TEMPLATES).replace(/\{(adj|noun|verb)\}/g,(_,k)=>k==='adj'?pick(ADJ):k==='noun'?pick(NOUN):pick(VERB));}

const phraseBtn=document.getElementById('phraseBtn');
const phraseText=document.getElementById('phraseText');
phraseBtn.addEventListener('click',()=>{phraseText.textContent='"'+generatePhrase()+'"';});

const quickA=document.getElementById('quickA');
const quickC=document.getElementById('quickC');
const exportBtn=document.getElementById('exportBtn');
const bA=document.getElementById('bA');
const bB=document.getElementById('bB');
const bC=document.getElementById('bC');
const bD=document.getElementById('bD');
const statusEl=document.getElementById('status');

let audioCtx;
const buffers={A:null,B:null,C:null,D:null};
let currentSource,currentBtn;
let activeRecorder=null,activeChunks=[],activeMode=null;
let bPlayed=false,dPlayed=false;

function setStatus(s){statusEl.textContent=s;}
function refreshExportBtn(){exportBtn.disabled=!['A','B','C','D'].some(k=>buffers[k]);}

function clearNextUp(){[quickA,bA,bB,quickC,bC,bD].forEach(el=>el&&el.classList&&el.classList.remove('next-up'));}
function updateNextUp(){
  clearNextUp();
  if(!buffers.A){quickA.classList.add('next-up');bA.classList.add('next-up');return;}
  if(!bPlayed){bB.classList.add('next-up');return;}
  if(!buffers.C){quickC.classList.add('next-up');return;}
  if(!dPlayed){bD.classList.add('next-up');return;}
}
updateNextUp();

function reverseBuffer(buffer){
  const r=audioCtx.createBuffer(buffer.numberOfChannels,buffer.length,buffer.sampleRate);
  for(let ch=0;ch<buffer.numberOfChannels;ch++){
    const s=buffer.getChannelData(ch);
    const d=r.getChannelData(ch);
    for(let i=0,n=s.length;i<n;i++)d[i]=s[n-1-i];
  }
  return r;
}

async function ensureCtx(){
  if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')await audioCtx.resume();
}

async function decodeBlob(blob){
  await ensureCtx();
  const ab=await blob.arrayBuffer();
  return await audioCtx.decodeAudioData(ab);
}

function loadSource(buffer){
  buffers.A=buffer;
  buffers.B=reverseBuffer(buffer);
  buffers.C=null;
  buffers.D=null;
  bPlayed=false;
  dPlayed=false;
  bA.disabled=false;
  bB.disabled=false;
  bC.disabled=true;
  bD.disabled=true;
  quickC.disabled=false;
  refreshExportBtn();
  updateNextUp();
}

async function startRecording(mode){
  await ensureCtx();
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    activeChunks=[];
    activeMode=mode;

    if(MediaRecorder.isTypeSupported('audio/mp4'))mime='audio/mp4';
    else if(MediaRecorder.isTypeSupported('audio/webm'))mime='audio/webm';

    activeRecorder.ondataavailable=e=>{if(e.data.size>0)activeChunks.push(e.data);};

      stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(activeChunks,{type:activeRecorder.mimeType});
