<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reverse Audio</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0e10;
    --ink: #f4ede4;
    --dim: #8a8377;
    --accent: #ff5b35;
    --line: #2a2723;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .frame {
    width: 100%;
    max-width: 560px;
    border: 1px solid var(--line);
    padding: 32px 28px;
  }
  .label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 44px;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  h1 em {
    font-style: italic;
    color: var(--accent);
    font-weight: 500;
  }
  .sub {
    color: var(--dim);
    font-size: 12px;
    margin: 10px 0 28px;
  }
  .recordBtn {
    width: 100%;
    padding: 22px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    margin-bottom: 12px;
  }
  .recordBtn.active {
    background: var(--accent);
    color: var(--bg);
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.65; }
  }
  .or {
    text-align: center;
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 0.3em;
    margin: 12px 0;
  }
  .drop {
    border: 1px dashed var(--line);
    padding: 20px 16px;
    text-align: center;
    margin-bottom: 22px;
    cursor: pointer;
    display: block;
  }
  .drop p { font-size: 12px; }
  input[type=file] { display: none; }
  canvas {
    width: 100%;
    height: 90px;
    display: block;
    background: #08090a;
    border: 1px solid var(--line);
    margin-bottom: 22px;
  }
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  button.play {
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 14px 8px;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line);
    cursor: pointer;
  }
  button.play:disabled { opacity: 0.3; }
  .status {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    font-size: 11px;
    color: var(--dim);
    display: flex;
    justify-content: space-between;
  }
  .status span:last-child { color: var(--ink); }
</style>
</head>
<body>
  <div class="frame">
    <div class="label">Web Audio Demo</div>
    <h1>Reverse <em>audio</em></h1>
    <p class="sub">Record live or pick a file. Decoded, flipped, played.</p>

    <button id="recBtn" class="recordBtn">● Record</button>

    <div class="or">— or —</div>

    <label class="drop" for="file">
      <p>Tap to choose a file</p>
    </label>
    <input type="file" id="file" />

    <canvas id="wave"></canvas>

    <div class="controls">
      <button id="playBtn" class="play" disabled>Original</button>
      <button id="revBtn" class="play" disabled>Reversed</button>
    </div>

    <div class="status">
      <span>STATUS</span>
      <span id="status">idle</span>
    </div>
  </div>
